<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meus Links</title>

<style>
body {
    background-color: #121212;
    color: white;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
}

.links-container {
    width: 100%;
    max-width: 350px;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.link-card {
    border: 2px solid #00ff88;
    color: #00ff88;
    padding: 15px;
    text-align: center;
    border-radius: 8px;
    cursor: pointer;
}

.link-card:hover {
    background: #00ff88;
    color: #121212;
}

.senha-container {
    display: none;
    flex-direction: column;
    gap: 10px;
}

#loading {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: #121212;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.loader {
    border: 4px solid #222;
    border-top: 4px solid #00ff88;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    to { transform: rotate(720deg); }
}
</style>
</head>

<body>

<h2>Meus Links</h2>

<div class="links-container">

    <a href="https://www.instagram.com/acarllos_/" class="link-card" target="_blank">Instagram Principal</a>
    <a href="https://www.instagram.com/artheruth/" class="link-card" target="_blank">Instagram Secundário</a>

    <div class="link-card" onclick="mostrarSenha()">Área Restrita 🔒</div>

    <div id="senha" class="senha-container">
        <input type="password" id="input">
        <button onclick="entrar()">Entrar</button>
    </div>

</div>

<div id="loading">
    <div class="loader"></div>
    <p>Verificando acesso...</p>
</div>

<script>
function mostrarSenha() {
    document.getElementById('senha').style.display = 'flex';
}

function entrar() {
    const senha = document.getElementById('input').value;

    const prefixo = "a9f3k2x_";
    const destino = prefixo + senha + ".html";

    document.getElementById('loading').style.display = 'flex';

    setTimeout(() => {
        window.location.href = destino;
    }, 1000);
}
</script>

</body>
</html>
